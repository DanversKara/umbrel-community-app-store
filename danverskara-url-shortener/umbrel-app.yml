  - https://raw.githubusercontent.com/DanversKara/umbrel-community-app-store/main/danverskara-url-shortener/gallery/1.png
releaseNotes: >-
  v1.0.2 — Full fix

  - Setup container now uses APP_SETUP_PORT from Umbrel (no hardcoded ports)

  - Setup tool now supports SQL database restore from backup file

  - Added DB environment variables to setup container so restore works

  - Fixed build vs image issue — setup container always uses pre-built Docker Hub image

  - Added db healthcheck dependency to setup container

  - Increased upload limit to 500MB to support large zip and sql files

  - Improved system status checks and UI in setup tool
submitter: DanversKara
