manifestVersion: 1
id: danverskara-url-shortener
name: Premium URL Shortener
tagline: Self-hosted link shortener with analytics and custom slugs
icon: https://raw.githubusercontent.com/DanversKara/umbrel-community-app-store/main/danverskara-url-shortener/icon.png
category: Networking
version: "1.0.2"
port: 3002
description: >-
  A self-hosted Premium URL Shortener that lets you create short, memorable links
  for any URL — all from your own Umbrel server.


  Features include:

  - Custom short slugs and branded links

  - Click analytics and referrer tracking

  - MariaDB-backed persistent storage

  - Upload main.zip via the Setup Tool (port shown below)

  - Restore your database backup (.sql file) via the Setup Tool

  - No third-party services or tracking


  SETUP INSTRUCTIONS:

  1. Visit the Setup Tool at the secondary port shown below.

  2. Upload your main.zip from CodeCanyon.

  3. (Optional) Restore your database backup .sql file.

  4. Visit the main app port and run the built-in installer.


  Database settings for the installer:

  - Host: db

  - Database: shortener

  - Username: shortener

  - Password: shown in Umbrel app settings

  - Prefix: pus_
developer: DanversKara
website: https://github.com/DanversKara/umbrel-community-app-store
dependencies: []
repo: https://github.com/DanversKara/umbrel-community-app-store
support: https://github.com/DanversKara/umbrel-community-app-store/issues
