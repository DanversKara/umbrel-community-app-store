manifestVersion: 1
id: danverskara-url-shortener
name: Premium URL Shortener
tagline: Self-hosted link shortener with analytics and custom slugs
icon: https://raw.githubusercontent.com/DanversKara/umbrel-community-app-store/main/danverskara-url-shortener/icon.png
category: Networking
version: "1.0.0"
port: 3002
description: >-
  A self-hosted Personal wrapper — requires your own GemPixel license and files from GemPixel (Go Read The README.MD BELOW for more info) powered by PHP 8.2 + MariaDB 11.


  TWO-PORT DESIGN:

  - Port shown below (APP_PORT): Public-facing shortener. Add this to your
    Cloudflare Tunnel and Nginx Proxy Manager.

  - Port 3003 (Admin — local only): Full app access for admin tasks.
    DO NOT expose this in Cloudflare or NPM. Access via http://umbrel.local:3003


  FIRST-RUN SETUP:

  1. Place your GemPixel app files into:
     ~/umbrel/app-data/danverskara-url-shortener/app/

  2. Edit config.php — set DBhost to "db", DBname/DBuser/DBpassword to
     "shortener" / "shortener" / your Umbrel app password.

  3. Import your SQL dump:
     docker exec -i danverskara-url-shortener_db_1 \
       mariadb -u shortener -p<password> shortener < your-dump.sql

  4. Fix permissions:
     docker exec danverskara-url-shortener_app_1 \
       chown -R www-data:www-data /var/www/html

