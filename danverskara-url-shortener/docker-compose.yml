services:

  # ── PUBLIC ─────────────────────────────────────────────────────────────
  # Expose APP_PORT via Cloudflare Tunnel → Nginx Proxy Manager
  app:
    image: webdevops/php-apache:8.2
    container_name: danverskara-url-shortener_app_1
    restart: unless-stopped
    ports:
      - "${APP_PORT}:80"
    volumes:
      - "${APP_DATA_DIR}/app:/app"
    environment:
      WEB_DOCUMENT_ROOT: /app/public
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: shortener
      DB_USER: shortener
      DB_PASS: ${APP_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - shortener-net

  # ── ADMIN (LOCAL ONLY) ──────────────────────────────────────────────────
  # Do NOT add port 3003 to Cloudflare or NPM.
  # Access only from inside your LAN: http://umbrel.local:3003
  admin:
    image: webdevops/php-apache:8.2
    container_name: danverskara-url-shortener_admin_1
    restart: unless-stopped
    ports:
      - "3003:80"
    volumes:
      - "${APP_DATA_DIR}/app:/app"
    environment:
      WEB_DOCUMENT_ROOT: /app/public
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: shortener
      DB_USER: shortener
      DB_PASS: ${APP_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - shortener-net

  # ── DATABASE ────────────────────────────────────────────────────────────
  db:
    image: mariadb:11
    container_name: danverskara-url-shortener_db_1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${APP_PASSWORD}
      MYSQL_DATABASE: shortener
      MYSQL_USER: shortener
      MYSQL_PASSWORD: ${APP_PASSWORD}
    volumes:
      - "${APP_DATA_DIR}/db:/var/lib/mysql"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - shortener-net

networks:
  shortener-net:
    driver: bridge
